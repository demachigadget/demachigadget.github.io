<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>QR解錠キー | 出町ガジェット</title>

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="QR解錠" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest-qr.json" />
  <meta name="theme-color" content="#3A9B3A" />

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --sky:    #7ECEF4;
      --accent: #3A9B3A;
      --accent-dark: #2E7D2E;
      --yellow: #FFD93D;
      --black:  #1A1A1A;
      --white:  #FFFFFF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
      background: var(--sky);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: max(env(safe-area-inset-top), 24px) 16px max(env(safe-area-inset-bottom), 32px);
    }

    /* ロゴ */
    .logo {
      font-size: 1rem; font-weight: 900;
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--white); border: 2.5px solid var(--black);
      border-radius: 30px; padding: 6px 18px 6px 8px;
      box-shadow: 3px 3px 0 var(--black); margin-bottom: 20px;
    }
    .logo-dot {
      width: 26px; height: 26px; background: var(--accent);
      border-radius: 50%; border: 2px solid var(--black);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
    }

    /* QRカード */
    .qr-card {
      background: var(--sky);
      border: 2.5px solid var(--black);
      border-radius: 16px;
      padding: 18px 18px 14px;
      text-align: center;
      box-shadow: 5px 5px 0 var(--black);
      width: 100%; max-width: 320px;
    }
    .qr-card-header {
      font-size: 0.72rem; color: var(--accent-dark); font-weight: 700;
      letter-spacing: 0.03em; margin-bottom: 6px;
    }
    .qr-card-name {
      font-size: 1.05rem; font-weight: 900; color: var(--accent);
      margin-bottom: 12px; line-height: 1.3;
    }
    #qr-canvas {
      display: flex; justify-content: center; align-items: center;
      background: white; border-radius: 10px; padding: 10px;
      margin: 0 auto 10px;
    }
    #qr-canvas canvas, #qr-canvas img { display: block; }
    .qr-card-footer {
      font-size: 0.68rem; color: #555; margin-top: 4px;
    }

    /* ボタン */
    .btn-save {
      width: 100%; max-width: 320px;
      background: var(--yellow); color: var(--black);
      border: 2.5px solid var(--black); border-radius: 14px;
      padding: 15px; font-size: 1rem; font-weight: 900;
      box-shadow: 4px 4px 0 var(--black); cursor: pointer;
      margin-top: 18px; font-family: inherit;
      display: flex; flex-direction: column; align-items: center; line-height: 1.3;
    }
    .btn-save:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--black); }

    .btn-home {
      width: 100%; max-width: 320px;
      background: var(--white); color: var(--black);
      border: 2.5px solid var(--black); border-radius: 14px;
      padding: 15px; font-size: 1rem; font-weight: 700;
      box-shadow: 4px 4px 0 var(--black); cursor: pointer;
      margin-top: 10px; font-family: inherit;
      display: flex; flex-direction: column; align-items: center; line-height: 1.3;
    }
    .btn-home:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--black); }

    .en { font-size: 0.8em; font-weight: 400; display: block; opacity: 0.82; margin-top: 2px; }

    /* ホーム追加ガイド */
    .guide-box {
      background: var(--white); border: 2px solid var(--black);
      border-radius: 14px; padding: 16px 18px;
      width: 100%; max-width: 320px; margin-top: 12px;
      display: none;
    }
    .guide-box h3 { font-size: 0.9rem; font-weight: 900; margin-bottom: 10px; }
    .guide-box ol { padding-left: 18px; }
    .guide-box li {
      font-size: 0.82rem; margin-bottom: 8px; line-height: 1.55;
    }
    .url-copy-box {
      background: #f3f3f3; border: 1px solid #ccc; border-radius: 8px;
      padding: 8px 10px; font-size: 0.7rem; word-break: break-all;
      margin: 6px 0; cursor: pointer; color: #333;
    }
    .copy-btn {
      display: inline-block; background: var(--accent); color: white;
      border: none; border-radius: 6px; padding: 5px 12px;
      font-size: 0.78rem; font-weight: 700; cursor: pointer;
      margin-top: 4px; font-family: inherit;
    }
    .copy-done { background: #666; }

    /* エラー画面 */
    .error-box {
      background: #fff5f5; border: 2px solid #e00;
      border-radius: 14px; padding: 24px; text-align: center;
      max-width: 320px; width: 100%;
    }
    .error-box p { font-size: 0.9rem; line-height: 1.6; }
    .btn-back {
      display: inline-block; margin-top: 14px;
      background: var(--accent); color: white;
      border: 2px solid var(--black); border-radius: 10px;
      padding: 10px 22px; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; text-decoration: none; font-family: inherit;
    }
  </style>
</head>
<body>

  <div class="logo">
    <div class="logo-dot">🔑</div>
    出町ガジェット / Demachi Gadget
  </div>

  <!-- QRビュー -->
  <div id="qr-view" style="display:none; width:100%; flex-direction:column; align-items:center;">

    <div class="qr-card" id="qr-card">
      <div class="qr-card-header">出町ガジェット / Demachi Gadget<br><span style="font-size:0.9em;font-weight:400;">QRキー / QR Key</span></div>
      <div class="qr-card-name" id="qr-name"></div>
      <div id="qr-canvas"></div>
      <div class="qr-card-footer">ドアのスキャナーにかざして解錠<br>Hold up to the door scanner to unlock</div>
    </div>

    <button class="btn-save" id="btn-save">📸 QRコードを画像保存する<span class="en">Save QR Code Image</span></button>
    <button class="btn-home" id="btn-home">📱 ホーム画面に追加する<span class="en">Add to Home Screen</span></button>

    <div class="guide-box" id="guide-box">
      <h3 id="guide-title"></h3>
      <ol id="guide-steps"></ol>
    </div>

  </div>

  <!-- エラービュー -->
  <div id="error-view" style="display:none;">
    <div class="error-box">
      <p>⚠️ QRコードが見つかりません。<br>発行ページから再度お試しください。<br><span style="font-size:0.88em;color:#888;">QR code not found. Please return to the issuance page.</span></p>
      <a class="btn-back" href="./">発行ページへ / Back</a>
    </div>
  </div>

  <script>
    // URLハッシュからトークンと名前を読み込む
    function loadFromHash() {
      const hash = location.hash.slice(1);
      if (!hash) return null;
      const params = {};
      hash.split('&').forEach(p => {
        const idx = p.indexOf('=');
        if (idx > 0) params[p.slice(0,idx)] = decodeURIComponent(p.slice(idx+1));
      });
      return (params.t && params.n) ? { token: params.t, name: params.n } : null;
    }

    // localStorage からトークンと名前を読み込む（ホーム画面から開いた場合）
    function loadFromStorage() {
      try {
        const t = localStorage.getItem('qr_token');
        const n = localStorage.getItem('qr_name');
        return (t && n) ? { token: t, name: n } : null;
      } catch(e) { return null; }
    }

    // localStorage に保存する
    function saveToStorage(token, name) {
      try {
        localStorage.setItem('qr_token', token);
        localStorage.setItem('qr_name', name);
      } catch(e) {}
    }

    const saved = loadFromHash() || loadFromStorage();

    if (!saved) {
      document.getElementById('error-view').style.display = 'block';
      document.getElementById('qr-view').style.display = 'none';
    } else {
      const { token, name } = saved;
      // ハッシュから読み込んだ場合は localStorage にも保存
      saveToStorage(token, name);
      document.getElementById('qr-view').style.display = 'flex';

      // 名前表示
      document.getElementById('qr-name').innerHTML = name + ' さんのQRキー<br><span style="font-size:0.82em;font-weight:400;color:#555;">Your personal QR key</span>';

      // QRコード生成
      const qrEl = document.getElementById('qr-canvas');
      new QRCode(qrEl, {
        text: token,
        width: 200,
        height: 200,
        colorDark: '#1A1A1A',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });

      // ===== 画像保存ボタン =====
      document.getElementById('btn-save').addEventListener('click', function() {
        // QRのcanvas/imgを取得
        const qrCanvas = qrEl.querySelector('canvas');
        const qrImg    = qrEl.querySelector('img');
        const qrSrc    = qrCanvas || qrImg;

        if (!qrSrc) { alert('QRコードの読み込みが完了していません。少し待ってから再度お試しください。\nQR code is still loading. Please wait and try again.'); return; }

        const isIOS    = /iphone|ipad|ipod/i.test(navigator.userAgent);
        const isSafari = /safari/i.test(navigator.userAgent) && !/chrome|crios|fxios/i.test(navigator.userAgent);

        // カード画像をCanvasで描画（html2canvas不要）
        const W = 300, H = 410;
        const oc  = document.createElement('canvas');
        oc.width  = W;
        oc.height = H;
        const ctx = oc.getContext('2d');

        // 背景（空色）
        ctx.fillStyle = '#7ECEF4';
        ctx.fillRect(0, 0, W, H);

        // 白いカード内枠
        ctx.fillStyle = '#ffffff';
        roundRect(ctx, 12, 12, W-24, H-24, 12);
        ctx.fill();

        // ヘッダー
        ctx.fillStyle = '#2E7D2E';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('出町ガジェット / Demachi Gadget', W/2, 40);
        ctx.fillStyle = '#555';
        ctx.font = '10px sans-serif';
        ctx.fillText('QRキー / QR Key', W/2, 54);

        // 名前
        ctx.fillStyle = '#1A1A1A';
        ctx.font = 'bold 15px sans-serif';
        ctx.fillText(name + ' さんのQRキー', W/2, 72);
        ctx.fillStyle = '#666';
        ctx.font = '11px sans-serif';
        ctx.fillText('Your personal QR key', W/2, 86);

        // QR画像を描画
        const qrSize = 190;
        const qrX = (W - qrSize) / 2;
        const qrY = 100;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(qrX - 6, qrY - 6, qrSize + 12, qrSize + 12);
        ctx.drawImage(qrSrc, qrX, qrY, qrSize, qrSize);

        // フッター
        ctx.fillStyle = '#3A9B3A';
        ctx.font = 'bold 11px sans-serif';
        ctx.fillText('ドアのスキャナーにかざして解錠', W/2, qrY + qrSize + 22);
        ctx.fillStyle = '#777';
        ctx.font = '10px sans-serif';
        ctx.fillText('Hold up to the door scanner to unlock', W/2, qrY + qrSize + 36);

        // ロゴ
        ctx.fillStyle = '#888888';
        ctx.font = '10px sans-serif';
        ctx.fillText('demachigadget.github.io', W/2, H - 18);

        const dataURL = oc.toDataURL('image/png');

        if (isIOS && isSafari) {
          // iOS Safari: ファイル共有（写真アプリへ保存可能）
          oc.toBlob(function(blob) {
            const file = new File([blob], name + '_QR解錠キー.png', { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
              navigator.share({ files: [file], title: 'QR解錠キー', text: name + 'さんのQR解錠キー' })
                .catch(function(e) { if (e.name !== 'AbortError') showOverlay(dataURL); });
            } else {
              showOverlay(dataURL);
            }
          }, 'image/png');
          return;
        }

        if (isIOS) {
          // iOS Chrome: 新しいタブに画像だけ表示 → 長押しで保存
          const newWin = window.open('', '_blank');
          if (newWin) {
            newWin.document.write(
              '<!DOCTYPE html><html><head>' +
              '<meta charset="UTF-8">' +
              '<meta name="viewport" content="width=device-width,initial-scale=1">' +
              '<title>QR画像を保存 - ' + name + '</title>' +
              '<style>' +
              'body{margin:0;background:#111;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}' +
              'img{max-width:90%;max-height:75vh;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.5);}' +
              'p{color:#fff;margin-top:20px;font-size:16px;text-align:center;line-height:1.7;padding:0 20px;}' +
              'strong{color:#FFD700;}' +
              'button{margin-top:16px;padding:12px 28px;background:#fff;color:#333;border:none;border-radius:24px;font-size:15px;font-weight:bold;cursor:pointer;}' +
              '</style></head>' +
              '<body>' +
              '<img src="' + dataURL + '" />' +
              '<p>📸 画像を<strong>長押し</strong>して<br>「写真に保存」を選んでください<br><span style="font-size:0.85em;color:#aaa;">Long-press image → Save to Photos</span></p>' +
              '<button onclick="window.close()">閉じる / Close</button>' +
              '</body></html>'
            );
            newWin.document.close();
          } else {
            // ポップアップブロック時はオーバーレイ
            showOverlay(dataURL);
          }
          return;
        }

        // PC・その他: ダウンロード
        const a = document.createElement('a');
        a.href = dataURL;
        a.download = name + '_QR解錠キー.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      });

      // roundRect helper（iOS 15以前用）
      function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

      // オーバーレイ（フォールバック）
      function showOverlay(dataURL) {
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;box-sizing:border-box;';
        const img = document.createElement('img');
        img.src = dataURL;
        img.style.cssText = 'max-width:100%;max-height:62vh;border-radius:12px;';
        const msg = document.createElement('p');
        msg.innerHTML = '📸 画像を<strong style="color:#FFD700">長押し</strong>して<br>「写真に保存」を選んでください<br><span style="font-size:0.85em;opacity:0.7;">Long-press → Save to Photos</span>';
        msg.style.cssText = 'color:white;margin-top:18px;font-size:16px;text-align:center;line-height:1.7;';
        const closeBtn = document.createElement('button');
        closeBtn.textContent = '閉じる / Close';
        closeBtn.style.cssText = 'margin-top:14px;padding:12px 32px;background:white;color:#333;border:none;border-radius:24px;font-size:15px;font-weight:bold;cursor:pointer;';
        closeBtn.onclick = function() { document.body.removeChild(overlay); };
        overlay.append(img, msg, closeBtn);
        document.body.appendChild(overlay);
      }

      // ===== ホーム画面追加ボタン =====
      document.getElementById('btn-home').addEventListener('click', function() {
        const isIOS      = /iphone|ipad|ipod/i.test(navigator.userAgent);
        const isSafari   = /safari/i.test(navigator.userAgent) && !/chrome|crios|fxios/i.test(navigator.userAgent);
        const isChromeIOS = /crios/i.test(navigator.userAgent);
        const currentURL = location.href;

        const guide = document.getElementById('guide-box');
        const title = document.getElementById('guide-title');
        const steps = document.getElementById('guide-steps');

        // iOS Safariでは navigator.share でシェアシートを開く（→「ホーム画面に追加」選択可）
        if (isSafari && navigator.share) {
          navigator.share({
            title: 'QR解錠キー - ' + name,
            url: currentURL
          }).catch(function(e) {});
          return;
        }

        // それ以外はガイドを表示
        guide.style.display = 'block';
        guide.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        if (isChromeIOS) {
          title.textContent = '📱 ホーム画面に追加する方法 / Add to Home Screen (Chrome)';
          steps.innerHTML =
            '<li>下のURLをコピーしてください：<br><small>Copy the URL below:</small></li>' +
            '<div class="url-copy-box" id="url-display">' + currentURL + '</div>' +
            '<button class="copy-btn" id="copy-btn" onclick="copyURL()">URLをコピー / Copy URL</button>' +
            '<li style="margin-top:12px;"><strong>Safari</strong> を開き、コピーしたURLをアドレスバーに貼り付けて開く<br><small>Open <strong>Safari</strong> and paste the URL in the address bar</small></li>' +
            '<li>Safari の画面下部の <strong>共有ボタン（□↑）</strong> をタップ<br><small>Tap the <strong>Share button (□↑)</strong> at the bottom of Safari</small></li>' +
            '<li>「<strong>ホーム画面に追加</strong>」を選択 → 「追加」をタップ<br><small>Select "<strong>Add to Home Screen</strong>" → Tap "Add"</small></li>';
        } else if (isIOS && isSafari) {
          title.textContent = '📱 Safari でホーム画面に追加する方法 / Add via Safari';
          steps.innerHTML =
            '<li>画面下部の <strong>共有ボタン（□↑）</strong> をタップ<br><small>Tap the <strong>Share button (□↑)</strong> at the bottom</small></li>' +
            '<li>「<strong>ホーム画面に追加</strong>」を選択<br><small>Select "<strong>Add to Home Screen</strong>"</small></li>' +
            '<li>右上の「<strong>追加</strong>」をタップ<br><small>Tap "<strong>Add</strong>" in the upper right</small></li>';
        } else {
          title.textContent = '📱 ホーム画面への追加方法 / Add to Home Screen';
          steps.innerHTML =
            '<li>ブラウザのメニュー（⋮）を開く<br><small>Open the browser menu (⋮)</small></li>' +
            '<li>「<strong>ホーム画面に追加</strong>」または「<strong>アプリをインストール</strong>」を選択<br><small>Select "<strong>Add to Home Screen</strong>" or "<strong>Install App</strong>"</small></li>' +
            '<li>画面の指示に従ってください<br><small>Follow the on-screen instructions</small></li>';
        }
      });

      // URL コピー関数
      window.copyURL = function() {
        const url = location.href;
        if (navigator.clipboard) {
          navigator.clipboard.writeText(url).then(function() {
            const btn = document.getElementById('copy-btn');
            if (btn) { btn.textContent = 'コピーしました！ Copied!'; btn.classList.add('copy-done'); }
          });
        } else {
          const ta = document.createElement('textarea');
          ta.value = url;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          const btn = document.getElementById('copy-btn');
          if (btn) { btn.textContent = 'コピーしました！'; btn.classList.add('copy-done'); }
        }
      };
    }

    // Service Worker 登録
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(){});
    }
  </script>
</body>
</html>
